<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Orlando Ferrer | Contact</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');

        body {
            font-family: 'Inter', sans-serif;
            color: #222;
            line-height: 1.6;
            margin: 0;
            background-color: #ffffff;
        }

        /* --- HEADER & NAVIGATION --- */
        header {
            max-width: 1000px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 30px 20px;
        }
        .header-name { font-size: 1.3rem; font-weight: 700; color: #555; }
        nav a { margin-left: 25px; color: #666; text-decoration: none; font-size: 1rem; }
        nav a:hover { color: #222; }

        /* --- BANNER --- */
        .banner {
            width: 100%;
            height: 250px; 
            background-image: url('duke_cherry_blossoms.jpg'); 
            background-size: cover;
            background-position: center;
            background-color: #e0e0e0; 
            margin-bottom: 50px;
        }

        /* --- PAGE CONTENT & FORM --- */
        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 0 20px 50px 20px;
            text-align: center;
        }
        h1 { font-size: 2.5rem; margin-bottom: 10px; font-weight: 700; letter-spacing: -1px; }
        p { color: #555; margin-bottom: 30px; }
        
        form {
            display: flex;
            flex-direction: column;
            gap: 20px;
            text-align: left;
            max-width: 600px;
            margin: 0 auto;
            background-color: #f9f9f9;
            padding: 30px;
            border-radius: 8px;
            border: 1px solid #eee;
        }
        label { font-weight: 600; font-size: 0.9rem; margin-bottom: -10px; }
        input, textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid #ccc;
            border-radius: 5px;
            font-family: inherit;
            font-size: 1rem;
            box-sizing: border-box;
        }
        button {
            padding: 15px;
            background-color: #222;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 1rem;
            cursor: pointer;
            font-weight: 700;
            margin-top: 10px;
        }
        button:hover { background-color: #444; }

        @media (max-width: 768px) {
            header { flex-direction: column; gap: 15px; }
        }
    </style>
</head>
<body>

<header>
    <div class="header-name">Orlando Ferrer</div>
    <nav>
        <a href="index.html">Home</a>
        <a href="tutoring.html">Tutoring Services</a>
        <a href="contact.html">Contact Me</a>
    </nav>
</header>

<div class="banner"></div>

<div class="container">
    <h1>Get in Touch</h1>
    <p>Interested in tutoring? Send me a message below with your current math goals, and I will get back to you shortly.</p>

    <form action="https://formsubmit.co/pipathmath@gmail.com" method="POST">
        <input type="hidden" name="_subject" value="New Tutoring Inquiry from Website!">
        
        <label for="name">Name</label>
        <input type="text" id="name" name="name" required placeholder="Jane Doe">

        <label for="email">Email Address</label>
        <input type="email" id="email" name="email" required placeholder="jane@example.com">

        <label for="message">Message</label>
        <textarea id="message" name="message" rows="5" required placeholder="Hi Orlando, I am looking for help with..."></textarea>

        <button type="submit">Send Message</button>
    </form>
</div>

</body>
</html>
